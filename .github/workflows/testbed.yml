name: Testbed (All)

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/testbed-*.sh'
      - 'kubernetes/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - 'Dockerfile'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/testbed-*.sh'
      - 'kubernetes/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - 'Dockerfile'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  testbed:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
      - uses: actions/setup-go@v5
        with:
          go-version-file: kubernetes/operator/go.mod
      - name: Install kind
        run: |
          make -C kubernetes/operator install-kind
          echo "${{ github.workspace }}/kubernetes/operator/bin" >> $GITHUB_PATH
      - name: Run all testbeds
        run: make ci/testbed
      - name: Collect logs
        if: failure()
        run: |
          mkdir -p /tmp/ci-logs
          # Solo testbed logs
          cp /tmp/tapi-solo/*.log /tmp/ci-logs/ 2>/dev/null || true
          cp /tmp/tapi-solo/*.toml /tmp/ci-logs/ 2>/dev/null || true
          # K8s logs (if a Kind cluster is still running)
          NS=${TAPIR_NAMESPACE:-tapir}
          OP_NS=${TAPIR_OPERATOR_NS:-tapirs-operator-system}
          kubectl get pods -A -o wide > /tmp/ci-logs/pods.txt 2>&1 || true
          kubectl get events -n "$NS" --sort-by=.lastTimestamp > /tmp/ci-logs/events.txt 2>&1 || true
          kubectl get events -n "$OP_NS" --sort-by=.lastTimestamp > /tmp/ci-logs/events-operator.txt 2>&1 || true
          kubectl get events -n cert-manager --sort-by=.lastTimestamp > /tmp/ci-logs/events-cert-manager.txt 2>&1 || true
          kubectl describe tapircluster -n "$NS" > /tmp/ci-logs/describe-tapircluster.txt 2>&1 || true
          kubectl describe pods -n "$NS" > /tmp/ci-logs/describe-pods.txt 2>&1 || true
          kubectl logs -n "$OP_NS" deployment/tapirs-operator --tail=500 > /tmp/ci-logs/logs-operator.txt 2>&1 || true
          kubectl logs -n cert-manager deployment/cert-manager --tail=200 > /tmp/ci-logs/logs-cert-manager.txt 2>&1 || true
          for pod in $(kubectl get pods -n "$NS" -o name 2>/dev/null); do
            name=$(basename "$pod")
            kubectl logs -n "$NS" "$name" --all-containers --tail=500 > "/tmp/ci-logs/logs-${name}.txt" 2>&1 || true
          done
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: testbed-all-logs
          path: /tmp/ci-logs/
          retention-days: 14
