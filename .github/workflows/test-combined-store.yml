name: Test Combined Store

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: clippy
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install gnuplot
        run: |
          sudo apt-get update
          sudo apt-get install -y gnuplot-nox
      - name: Cache maelstrom binary
        uses: actions/cache@v4
        with:
          path: .maelstrom
          key: maelstrom-0.2.4
      - name: Test
        run: make ci/test-combined-store
