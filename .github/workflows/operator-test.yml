name: Operator Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'kubernetes/operator/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'kubernetes/operator/**'

defaults:
  run:
    working-directory: kubernetes/operator

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: kubernetes/operator/go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test
