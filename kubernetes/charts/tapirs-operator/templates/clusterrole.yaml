apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tapirs-operator.fullname" . }}-manager
  labels:
    {{- include "tapirs-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tapir.tapir.dev
  resources:
  - tapirclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tapir.tapir.dev
  resources:
  - tapirclusters/finalizers
  verbs:
  - update
- apiGroups:
  - tapir.tapir.dev
  resources:
  - tapirclusters/status
  verbs:
  - get
  - patch
  - update
