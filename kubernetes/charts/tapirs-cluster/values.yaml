# name overrides the TAPIRCluster metadata.name (defaults to release name).
name: ""

image: tapir:latest

discovery:
  replicas: 3

nodePools:
  - name: default
    replicas: 3

shards:
  - number: 0
    replicas: 3
    keyRangeEnd: "n"
  - number: 1
    replicas: 3
    keyRangeStart: "n"

# tls configures mutual TLS for all cluster communication via cert-manager.
tls:
  enabled: false
  issuerRef:
    name: ""
    kind: ClusterIssuer

# s3 configures S3 remote storage for automatic segment/manifest upload.
s3:
  bucket: ""
  prefix: ""
  endpoint: ""
  region: ""
  credentialsSecret: ""
