# name overrides the TAPIRCluster metadata.name (defaults to release name).
name: ""

image: tapir:latest

discovery:
  replicas: 3

nodePools:
  - name: default
    replicas: 3

shards:
  - number: 0
    replicas: 3
    keyRangeEnd: "n"
  - number: 1
    replicas: 3
    keyRangeStart: "n"

# tls configures mutual TLS for all cluster communication via cert-manager.
tls:
  enabled: false
  issuerRef:
    name: ""
    kind: ClusterIssuer

# destination configures where the cluster uploads segments and manifests.
destination:
  s3:
    bucket: ""
    prefix: ""
    endpoint: ""
    region: ""
    credentialsSecret: ""

# source configures bootstrap from an existing S3 backup.
# mode: "writableClone" creates an independent writable cluster via COW.
#       "readReplica" creates a read-only cluster that auto-refreshes.
source:
  enabled: false
  s3:
    bucket: ""
    prefix: ""
    endpoint: ""
    region: ""
    credentialsSecret: ""
  mode: writableClone
  refreshInterval: ""
  snapshotName: ""
