apiVersion: tapir.tapir.dev/v1alpha1
kind: TAPIRCluster
metadata:
  name: {{ include "tapirs-cluster.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tapirs-cluster.labels" . | nindent 4 }}
spec:
  image: {{ .Values.image }}
  discovery:
    replicas: {{ .Values.discovery.replicas }}
  nodePools:
    {{- range .Values.nodePools }}
    - name: {{ .name }}
      replicas: {{ .replicas }}
      {{- if .resources }}
      resources:
        {{- toYaml .resources | nindent 8 }}
      {{- end }}
    {{- end }}
  shards:
    {{- range .Values.shards }}
    - number: {{ .number }}
      replicas: {{ .replicas }}
      {{- if .keyRangeStart }}
      keyRangeStart: {{ .keyRangeStart | quote }}
      {{- end }}
      {{- if .keyRangeEnd }}
      keyRangeEnd: {{ .keyRangeEnd | quote }}
      {{- end }}
      {{- if .storage }}
      storage: {{ .storage }}
      {{- end }}
    {{- end }}
