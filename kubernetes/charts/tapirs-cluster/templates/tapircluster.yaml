apiVersion: tapir.tapir.dev/v1alpha1
kind: TAPIRCluster
metadata:
  name: {{ include "tapirs-cluster.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tapirs-cluster.labels" . | nindent 4 }}
spec:
  image: {{ .Values.image }}
  discovery:
    replicas: {{ .Values.discovery.replicas }}
  nodePools:
    {{- range .Values.nodePools }}
    - name: {{ .name }}
      replicas: {{ .replicas }}
      {{- if .resources }}
      resources:
        {{- toYaml .resources | nindent 8 }}
      {{- end }}
    {{- end }}
  shards:
    {{- range .Values.shards }}
    - number: {{ .number }}
      replicas: {{ .replicas }}
      {{- if .keyRangeStart }}
      keyRangeStart: {{ .keyRangeStart | quote }}
      {{- end }}
      {{- if .keyRangeEnd }}
      keyRangeEnd: {{ .keyRangeEnd | quote }}
      {{- end }}
      {{- if .storage }}
      storage: {{ .storage }}
      {{- end }}
    {{- end }}
  {{- if .Values.tls.enabled }}
  tls:
    enabled: true
    issuerRef:
      name: {{ .Values.tls.issuerRef.name }}
      kind: {{ .Values.tls.issuerRef.kind }}
  {{- end }}
  {{- if .Values.s3.bucket }}
  s3:
    bucket: {{ .Values.s3.bucket }}
    {{- if .Values.s3.prefix }}
    prefix: {{ .Values.s3.prefix }}
    {{- end }}
    {{- if .Values.s3.endpoint }}
    endpoint: {{ .Values.s3.endpoint }}
    {{- end }}
    {{- if .Values.s3.region }}
    region: {{ .Values.s3.region }}
    {{- end }}
    {{- if .Values.s3.credentialsSecret }}
    credentialsSecret: {{ .Values.s3.credentialsSecret }}
    {{- end }}
  {{- end }}
