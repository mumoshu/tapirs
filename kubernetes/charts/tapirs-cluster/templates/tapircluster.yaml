apiVersion: tapir.tapir.dev/v1alpha1
kind: TAPIRCluster
metadata:
  name: {{ include "tapirs-cluster.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tapirs-cluster.labels" . | nindent 4 }}
spec:
  image: {{ .Values.image }}
  discovery:
    replicas: {{ .Values.discovery.replicas }}
  nodePools:
    {{- range .Values.nodePools }}
    - name: {{ .name }}
      replicas: {{ .replicas }}
      {{- if .resources }}
      resources:
        {{- toYaml .resources | nindent 8 }}
      {{- end }}
    {{- end }}
  shards:
    {{- range .Values.shards }}
    - number: {{ .number }}
      replicas: {{ .replicas }}
      {{- if .keyRangeStart }}
      keyRangeStart: {{ .keyRangeStart | quote }}
      {{- end }}
      {{- if .keyRangeEnd }}
      keyRangeEnd: {{ .keyRangeEnd | quote }}
      {{- end }}
      {{- if .storage }}
      storage: {{ .storage }}
      {{- end }}
    {{- end }}
  {{- if .Values.tls.enabled }}
  tls:
    enabled: true
    issuerRef:
      name: {{ .Values.tls.issuerRef.name }}
      kind: {{ .Values.tls.issuerRef.kind }}
  {{- end }}
  {{- if .Values.destination.s3.bucket }}
  destination:
    s3:
      bucket: {{ .Values.destination.s3.bucket }}
      {{- if .Values.destination.s3.prefix }}
      prefix: {{ .Values.destination.s3.prefix }}
      {{- end }}
      {{- if .Values.destination.s3.endpoint }}
      endpoint: {{ .Values.destination.s3.endpoint }}
      {{- end }}
      {{- if .Values.destination.s3.region }}
      region: {{ .Values.destination.s3.region }}
      {{- end }}
      {{- if .Values.destination.s3.credentialsSecret }}
      credentialsSecret: {{ .Values.destination.s3.credentialsSecret }}
      {{- end }}
  {{- end }}
  {{- if .Values.source.enabled }}
  source:
    s3:
      bucket: {{ .Values.source.s3.bucket }}
      {{- with .Values.source.s3.prefix }}
      prefix: {{ . }}
      {{- end }}
      {{- with .Values.source.s3.endpoint }}
      endpoint: {{ . }}
      {{- end }}
      {{- with .Values.source.s3.region }}
      region: {{ . }}
      {{- end }}
      {{- with .Values.source.s3.credentialsSecret }}
      credentialsSecret: {{ . }}
      {{- end }}
    mode: {{ .Values.source.mode }}
    {{- with .Values.source.refreshInterval }}
    refreshInterval: {{ . }}
    {{- end }}
    {{- with .Values.source.snapshotName }}
    snapshotName: {{ . }}
    {{- end }}
  {{- end }}
