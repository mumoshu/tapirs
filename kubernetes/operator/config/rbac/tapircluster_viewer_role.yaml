# This rule is not used by the project tapirs-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to tapir.tapir.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: tapirs-operator
    app.kubernetes.io/managed-by: kustomize
  name: tapircluster-viewer-role
rules:
- apiGroups:
  - tapir.tapir.dev
  resources:
  - tapirclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - tapir.tapir.dev
  resources:
  - tapirclusters/status
  verbs:
  - get
