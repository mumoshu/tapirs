apiVersion: tapir.tapir.dev/v1alpha1
kind: TAPIRCluster
metadata:
  labels:
    app.kubernetes.io/name: tapirs-operator
    app.kubernetes.io/managed-by: kustomize
  name: tapircluster-sample
spec:
  image: tapir:latest
  discovery:
    replicas: 3
  nodePools:
    - name: default
      replicas: 3
  shards:
    - number: 0
      replicas: 3
      keyRangeEnd: "n"
    - number: 1
      replicas: 3
      keyRangeStart: "n"
